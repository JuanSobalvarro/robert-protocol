syntax = "proto3";

package robert.protocol;

enum CommandType {
    PING = 0;
    PINGR = 1;
    ZERO = 2;
    EXIT = 3;
    MOVEL = 4;
    MOVEJ = 5;
    MOVEC = 6;
    MOVEABSJ = 7;
    SETSPEED = 8;
    SETZONE = 9;
    GETSTATUS = 10;
    CHECKTASK = 11;

    LOGIN = 12;
    LOGOUT = 13;

    ACQUIRE = 14; // request exclusive control
    RELEASE = 15; // release control
}

message Position {
    float x = 1;
    float y = 2;
    float z = 3;
}

message Orientation {
    float q1 = 1;
    float q2 = 2;
    float q3 = 3;
    float q4 = 4;
}

message ConfData {
    int32 cf1 = 1;
    int32 cf4 = 2;
    int32 cf6 = 3;
    int32 cfx = 4;
}

message RobJoint {
    float rax_1 = 1;
    float rax_2 = 2;
    float rax_3 = 3;
    float rax_4 = 4;
    float rax_5 = 5;
    float rax_6 = 6;
}

message ExtJoint {
    float eax_a = 1;
    float eax_b = 2;
    float eax_c = 3;
    float eax_d = 4;
    float eax_e = 5;
    float eax_f = 6;
}

message RobTarget {
    Position trans = 1;
    Orientation rot = 2;
    ConfData robconf = 3;
    ExtJoint extax = 4;
}

message JointTarget {
    RobJoint robjoint = 1;
    ExtJoint extjoint = 2;
}

enum Zone {
    FINE  = 0;
    Z1    = 1;
    Z5    = 2;
    Z10   = 3;
    Z15   = 4;
    Z20   = 5;
    Z30   = 6;
}

enum OpMode {
    OP_UNDEF = 0;
    OP_AUTO = 1;
    OP_MAN_PROG = 2;
    OP_MAN_TEST = 3;
}

// main wrapper for all info
message ClientRequest {
    CommandType command = 1; // always required
    RobTarget target = 2; // only for MOVEL, MOVEJ
    RobTarget extra_target = 3; // only for MOVEC
    JointTarget joint_target = 4; // only for MoveAbsJ
    uint64 task_id = 5; // only for CHECKTASK
    float speed = 6; // only for SETSPEED
    Zone zone = 7; // only for SETZONE
    string session_token = 8; // only for LOGIN, LOGOUT, ACQUIRE, RELEASE
    string username = 9; // only for LOGIN
    string password = 10; // only for LOGIN
}

enum ResponseStatus {
    SUCCESS = 0;
    ERROR = 1;
    WARNING = 2;
}

message RobotStatus {
    OpMode op_mode = 1;
    float speed_override = 2;
    float current_speed = 3;
    Zone current_zone = 4;
    RobTarget current_target = 5;
    JointTarget current_joint_target = 6;
    string robot_time = 7;
    string robot_date = 8;
}

enum TaskStatus {
    TASK_UNKNOWN = 0;
    TASK_PENDING = 1;
    TASK_IN_PROGRESS = 2;
    TASK_COMPLETED = 3;
    TASK_FAILED = 4;
}

message ServerResponse {
    ResponseStatus status = 1;
    string error_message = 2;
    uint64 task_id = 3; // if the response is related to robotic operations, we return a tracking task id
    TaskStatus task_status = 4;

    oneof payload {
        string text_payload = 5;
        RobotStatus robot_status = 6; // only for GETSTATUS
    }
}
